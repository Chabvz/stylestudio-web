<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting — StyleStudio</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0D0D0D;
      color: #F5F2EC;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 16px;
    }
    .icon { font-size: 40px; }
    p { color: #888; font-size: 15px; margin: 0; }
  </style>
</head>
<body>
  <div class="icon">✦</div>
  <p>Returning to StyleStudio…</p>

  <script>
    // Relay all OAuth params back into the app via custom scheme
    const params = window.location.search;
    const hash = window.location.hash;
    const appUrl = 'stylestudio://oauth' + (params || '') + (hash || '');
    window.location.replace(appUrl);

    // Fallback message if redirect doesn't fire (e.g. desktop browser)
    setTimeout(() => {
      document.querySelector('p').textContent =
        'Open this link on your mobile device to continue in StyleStudio.';
    }, 2000);
  </script>
</body>
</html>
